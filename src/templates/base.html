<!DOCTYPE html>
<html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}SentimentTools{% endblock %}</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.0/dist/cdn.min.js" defer></script>
<link rel="stylesheet" href="/static/css/app.css">{% block head %}{% endblock %}</head>
<body class="bg-gray-950 text-gray-100 min-h-screen"><nav class="border-b border-gray-800 px-6 py-3"><div class="max-w-5xl mx-auto flex items-center justify-between"><a href="/" class="text-lg font-bold text-white tracking-tight">SentimentTools</a><span class="text-sm text-gray-500">v2.0.0</span></div></nav><main class="max-w-5xl mx-auto px-6 py-8">{% block content %}{% endblock %}</main>{% block scripts %}{% endblock %}</body></html>
