<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="SentimentTools — Open-source tool for web crawling, scraping, and sentiment analysis for research.">
  <title>{% block title %}SentimentTools{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/app.css">
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.0/dist/cdn.min.js" defer></script>
  {% block head %}{% endblock %}
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="nav-brand">
        <span class="icon">🔬</span> SentimentTools
      </a>
      <div class="nav-links">
        <a href="/" class="nav-link {% if request.url.path == '/' %}active{% endif %}">Analisis</a>
        <a href="/history" class="nav-link {% if request.url.path == '/history' %}active{% endif %}">Riwayat</a>
        <span class="nav-badge">v3.0</span>
      </div>
    </div>
  </nav>

  <main class="main">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <p>SentimentTools v3.0.0 — Open Source Research Tool</p>
    <p style="margin-top:4px">Crawling · Scraping · Sentiment Analysis · 100% Lokal</p>
  </footer>

  {% block scripts %}{% endblock %}
</body>
</html>
