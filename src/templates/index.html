{% extends "base.html" %}
{% block title %}Analisis Sentimen{% endblock %}
{% block content %}
<section class="py-6"><h1 class="text-3xl font-bold text-white mb-2">Analisis Sentimen</h1><p class="text-gray-400 mb-8 max-w-2xl text-sm">Masukkan URL untuk menganalisis sentimen lokal.</p>
<div x-data="af()" class="space-y-5"><div><label class="block text-sm font-medium text-gray-300 mb-2">URL Target</label><textarea x-model="urls" placeholder="https://kompas.com/...\nhttps://detik.com/..." rows="6" class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 text-white placeholder:text-gray-500 focus:outline-none focus:ring-2 focus:ring-amber-500/50 resize-none font-mono text-sm"></textarea><p class="text-xs text-gray-500 mt-1.5" x-text="uc()+' URL'"></p></div><div x-data="{o:false}"><button type="button" @click="o=!o" class="text-sm text-gray-500 hover:text-gray-300 flex items-center gap-1"><span x-text="o?'\u25B2':'\u25BC'" class="text-xs"></span> Opsi Lanjutan</button><div x-show="o" x-transition class="mt-3 p-4 bg-gray-900/60 rounded-xl border border-gray-800 space-y-3"><div><label class="text-xs text-gray-400 block mb-1">Kedalaman: <span class="text-amber-400" x-text="depth"></span></label><input type="range" x-model="depth" min="1" max="5" class="w-full accent-amber-500"></div><label class="flex items-center gap-3 text-sm text-gray-300 cursor-pointer"><input type="checkbox" x-model="js" class="accent-amber-500 w-4 h-4"> JS Rendering</label></div></div><button @click="go()" :disabled="busy||uc()===0" class="w-full bg-amber-500 hover:bg-amber-600 disabled:opacity-40 disabled:cursor-not-allowed text-black font-semibold py-3 px-6 rounded-xl transition-all flex items-center justify-center gap-2 text-sm"><template x-if="busy"><span class="animate-spin w-4 h-4 border-2 border-black border-t-transparent rounded-full"></span></template><span x-text="busy?'Memulai...':'Mulai Analisis'"></span></button><p x-show="err" x-text="err" class="text-red-400 text-sm bg-red-950/40 border border-red-900/50 rounded-lg p-3"></p></div></section>
{% endblock %}
{% block scripts %}
<script>function af(){return{urls:'',depth:2,js:false,busy:false,err:'',uc(){return this.urls.split('\n').map(u=>u.trim()).filter(u=>u).length},async go(){const l=this.urls.split('\n').map(u=>u.trim()).filter(u=>u);if(!l.length){this.err='Min 1 URL';return}this.busy=true;this.err='';try{const r=await fetch('/api/v1/analysis',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({urls:l,depth:this.depth,use_js_rendering:this.js})});if(!r.ok){const e=await r.json();throw new Error(e.detail||'Gagal')}const d=await r.json();window.location.href=d.redirect_url}catch(e){this.err=e.message}finally{this.busy=false}}}}</script>
{% endblock %}
